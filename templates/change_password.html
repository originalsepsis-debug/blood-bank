<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="/static/style.css">
  <title>Зміна пароля</title>
</head>
<body class="login">
  <main class="login-card">
    <h1>Зміна пароля</h1>
    <p>{{version}}</p>
    {% if error %}<div class="error">{{error}}</div>{% endif %}
    <form method="post">
      <input type="hidden" name="csrf" value="{{csrf}}">
      {% if not first_login %}
      <input name="old_password" type="password" placeholder="Старий пароль" required autocomplete="current-password">
      {% endif %}
      <input name="new_password" type="password" placeholder="Новий пароль" required minlength="6" autocomplete="new-password">
      <button>Зберегти пароль</button>
    </form>
  </main>
</body>
</html>
