<!doctype html><html lang="uk"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>{{title}}</title><link rel="stylesheet" href="/static/style.css"></head><body class="login-body"><div class="login-card"><h1>Зміна пароля</h1><p>Потрібно змінити пароль після першого входу.</p>{% if error %}<div class="danger">{{error}}</div>{% endif %}<form method="post" action="/change-password"><label>Старий пароль</label><input name="old_password" type="password" required><label>Новий пароль</label><input name="new_password" type="password" required><label>Повторіть пароль</label><input name="new_password2" type="password" required><button class="btn-red" type="submit">Змінити пароль</button></form></div></body></html>
