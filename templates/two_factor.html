<!doctype html><html lang="uk"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>{{ title }} · 2FA</title><link rel="stylesheet" href="/static/style.css"></head><body class="login-body"><div class="login-card"><h1>🔐 Двофакторний вхід</h1><p>Введіть код підтвердження з Telegram або TOTP-додатка.</p>{% if error %}<div class="error">{{ error }}</div>{% endif %}<form method="post"><input name="code" inputmode="numeric" autocomplete="one-time-code" placeholder="6-значний код" autofocus><button class="btn-green" type="submit">Підтвердити</button></form><a href="/logout">Скасувати</a></div></body></html>
