<!doctype html><html lang="uk"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>{{title}}</title><link rel="stylesheet" href="/static/style.css"><link rel="manifest" href="/manifest.json"></head><body class="login-body"><div class="login-card"><h1>🩸 Банк крові V5.9.4</h1><h2>Вхід у систему</h2>{% if error %}<div class="danger">{{error}}</div>{% endif %}<form method="post" action="/login"><label>Логін</label><input name="username" autocomplete="username" placeholder="Логін" required><label>Пароль</label><input name="password" type="password" autocomplete="current-password" placeholder="Пароль" required><button class="btn-red" type="submit">Увійти</button></form></div></body></html>
