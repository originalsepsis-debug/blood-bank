<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="/static/style.css">
  <title>Вхід — Банк крові</title>
</head>
<body class="login">
  <main class="login-card" aria-label="Форма входу">
    <div class="login-brand">
      <div class="login-logo">🩸</div>
      <div>
        <h1>Банк крові</h1>
        <p>Система обліку компонентів крові</p>
      </div>
    </div>
    {% if error %}<div class="error">{{error}}</div>{% endif %}
    <form method="post" autocomplete="on">
      <label>Логін
        <input name="username" placeholder="Введіть логін" required autofocus autocomplete="username" value="{{ request.form.get('username','') }}">
      </label>
      <label>Пароль
        <input name="password" type="password" placeholder="Введіть пароль" required autocomplete="current-password">
      </label>
      <button type="submit">Увійти</button>
    </form>
    <p class="login-version">{{version}}</p>
  </main>
</body>
</html>
